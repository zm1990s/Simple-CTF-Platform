{% extends "base.html" %}

{% block title %}{{ _('Create Team') }} - {{ super() }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-plus-circle"></i> {{ _('Create a New Team') }}</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('teams.create_team') }}">
                    <div class="mb-3">
                        <label class="form-label">{{ _('Team Name') }} <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" maxlength="100" required
                               placeholder="{{ _('Enter a unique team name') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Description') }}</label>
                        <textarea name="description" class="form-control" rows="3"
                                  placeholder="{{ _('Optional team description') }}"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle"></i> {{ _('Create Team') }}
                        </button>
                        <a href="{{ url_for('teams.teams_list') }}" class="btn btn-secondary">
                            {{ _('Cancel') }}
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
